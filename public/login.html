<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>

<body style="font-family:Arial;background:#f5f5f5;">

<div style="width:300px;margin:120px auto;background:white;padding:20px;border-radius:10px;text-align:center;">
  
  <h2>Login</h2>

  <input id="username" placeholder="Username" style="width:100%;padding:10px;margin-bottom:10px;">
  <input id="password" type="password" placeholder="Password" style="width:100%;padding:10px;margin-bottom:10px;">

  <button onclick="login()" style="width:100%;padding:10px;">Login</button>

  <p id="msg"></p>

  <p>
    No account? <a href="/register.html">Register</a>
  </p>

</div>

<script>
async function login() {

  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const res = await fetch("/api/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();

  if (data.error) {
    document.getElementById("msg").innerText = data.error;
  } else {
    if (data.role === "admin") {
      window.location.href = "/admin.html";
    } else {
      window.location.href = "/dashboard.html";
    }
  }
}
</script>

</body>
</html>
