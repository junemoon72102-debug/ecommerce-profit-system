<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register - ProfitAI</title>
</head>

<body style="font-family: Arial; background:#f5f5f5;">

<div style="
  width:300px;
  margin:120px auto;
  background:white;
  padding:20px;
  border-radius:10px;
  text-align:center;
">

  <h2>Register</h2>

  <input id="username" placeholder="Username" style="width:100%; padding:10px; margin-bottom:10px;">
  
  <input id="password" type="password" placeholder="Password" style="width:100%; padding:10px; margin-bottom:10px;">

  <button onclick="register()" style="width:100%; padding:10px;">Register</button>

  <p id="msg" style="margin-top:10px;"></p>

  <p style="margin-top:15px;">
    Already have an account?
    <a href="/login.html">Login</a>
  </p>

</div>

<script>
async function register() {

  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  try {
    const res = await fetch("/api/signup", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        username: username,
        password: password
      })
    });

    const data = await res.json();

    if (data.message) {
      document.getElementById("msg").innerText = "Registered successfully!";

      // auto redirect
      setTimeout(() => {
        window.location.href = "/login.html";
      }, 1000);

    } else {
      document.getElementById("msg").innerText = data.error || "Registration failed";
    }

  } catch (err) {
    document.getElementById("msg").innerText = "Server error";
  }
}
</script>

</body>
</html>
