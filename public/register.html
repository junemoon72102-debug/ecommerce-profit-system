<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
</head>

<body style="font-family:Arial;background:#f5f5f5;">

<div style="width:300px;margin:120px auto;background:white;padding:20px;border-radius:10px;text-align:center;">
  
  <h2>Register</h2>

  <input id="username" placeholder="Username" style="width:100%;padding:10px;margin-bottom:10px;">
  <input id="password" type="password" placeholder="Password" style="width:100%;padding:10px;margin-bottom:10px;">

  <button onclick="register()" style="width:100%;padding:10px;">Register</button>

  <p id="msg"></p>

</div>

<script>
async function register() {

  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const res = await fetch("/api/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();

  document.getElementById("msg").innerText = data.message || data.error;
}
</script>

</body>
</html>
